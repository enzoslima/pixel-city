<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel City v5.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden}
#gc{position:relative;width:960px;height:640px;border:2px solid #222}
#cv{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#hud{position:absolute;top:5px;left:5px;right:5px;display:flex;gap:6px;z-index:11;pointer-events:none}
.hi{background:rgba(0,0,0,0.85);border:1px solid #333;padding:3px 8px;color:#fff;font-size:10px;display:flex;align-items:center;gap:4px;border-radius:3px}
.bar{width:55px;height:7px;background:#111;border:1px solid #333;overflow:hidden}
.bf{height:100%;transition:width 0.3s}
#hpBar{background:#e74c3c}#stBar{background:#f39c12}#huBar{background:#e67e22}
#money{color:#2ecc71;font-weight:bold;font-size:12px}
#wanted{color:#e74c3c;font-weight:bold;display:none}
#prompt{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.95);border:2px solid #f1c40f;color:#f1c40f;padding:10px 30px;font-size:14px;z-index:12;display:none;pointer-events:none;text-align:center;font-weight:bold;white-space:nowrap}
#notif{position:absolute;top:38px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.92);border:1px solid #2ecc71;color:#2ecc71;padding:5px 16px;font-size:10px;z-index:15;display:none;pointer-events:none;white-space:nowrap}
#menu{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;max-height:450px;background:rgba(5,5,20,0.97);border:2px solid #e74c3c;color:#ecf0f1;padding:18px;z-index:30;display:none;pointer-events:auto;overflow-y:auto;border-radius:5px}
#menu h2{text-align:center;margin-bottom:12px;font-size:14px}
.mi{display:flex;justify-content:space-between;align-items:center;padding:10px;border:1px solid #222;margin-bottom:4px;cursor:pointer;border-radius:3px}
.mi:hover{background:rgba(255,255,255,0.08);border-color:#f1c40f}
.mn{font-size:12px;font-weight:bold}.mp{color:#2ecc71;font-weight:bold}.md{color:#666;font-size:9px}
.cb{position:absolute;top:8px;right:12px;color:#e74c3c;cursor:pointer;font-size:20px;font-weight:bold}
.cb:hover{color:#fff}
#work{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:620px;height:420px;background:rgba(5,5,15,0.98);border:2px solid #f39c12;z-index:25;display:none;pointer-events:auto;overflow:hidden}
#wc{width:100%;height:100%;image-rendering:pixelated}
#title{position:absolute;top:0;left:0;width:100%;height:100%;background:#0a0a15;z-index:50;display:flex;flex-direction:column;justify-content:center;align-items:center;pointer-events:auto}
#title h1{font-size:40px;color:#fff;text-shadow:3px 3px 0 #e74c3c,0 0 20px rgba(231,76,60,0.4);letter-spacing:3px}
#title h2{font-size:16px;color:#f39c12;margin-bottom:30px;letter-spacing:5px}
.btn{background:none;border:2px solid #e74c3c;color:#e74c3c;padding:10px 35px;font-family:'Courier New',monospace;font-size:14px;cursor:pointer;margin:4px;border-radius:3px}
.btn:hover{background:#e74c3c;color:#fff}
#title p{color:#444;font-size:9px;margin-top:20px}
#minimap{position:absolute;bottom:8px;right:8px;width:150px;height:150px;border:2px solid #333;background:rgba(0,0,0,0.9);z-index:11;pointer-events:none;overflow:hidden}
#mc{width:100%;height:100%;image-rendering:pixelated}
#dno{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
#ctrl{position:absolute;bottom:5px;left:5px;color:#444;font-size:8px;z-index:11;pointer-events:none}
</style>
</head>
<body>
<div id="gc">
<canvas id="cv" width="960" height="640"></canvas>
<div id="dno"></div>
<div id="hud">
<div class="hi">❤️<div class="bar"><div id="hpBar" class="bf" style="width:100%"></div></div></div>
<div class="hi">⚡<div class="bar"><div id="stBar" class="bf" style="width:100%"></div></div></div>
<div class="hi">🍗<div class="bar"><div id="huBar" class="bf" style="width:100%"></div></div></div>
<div class="hi"><span id="money">$100</span></div>
<div class="hi" id="outfitD" style="color:#aaa;font-size:9px">👕Camiseta</div>
<div class="hi" id="wanted">⭐</div>
<div class="hi" id="clock" style="margin-left:auto">☀️06:00 D1</div>
</div>
<div id="minimap"><canvas id="mc" width="150" height="150"></canvas></div>
<div id="prompt">[E] ENTRAR</div>
<div id="notif"></div>
<div id="menu"><span class="cb" onclick="closeMenu()">✕</span><h2 id="menuTitle"></h2><div id="menuItems"></div></div>
<div id="work"><canvas id="wc" width="620" height="420"></canvas></div>
<div id="ctrl">WASD:Mover E:Entrar SPACE:Socar Q:Carro rua F:Garagem/Sair</div>
<div id="title">
<h1>PIXEL CITY</h1>
<h2>HUSTLE &amp; DRIVE</h2>
<button class="btn" onclick="begin(0)">▶ NOVO JOGO</button>
<button class="btn" onclick="begin(1)">💾 CONTINUAR</button>
<button class="btn" onclick="help()">🎮 CONTROLES</button>
<p>v5.1</p>
</div>
</div>

<script>
const cv=document.getElementById('cv'), X=cv.getContext('2d');
const mc=document.getElementById('mc'), MX=mc.getContext('2d');
const wc=document.getElementById('wc'), WX=wc.getContext('2d');
const T=32, MW=100, MH=100;
let go=false, menuOn=false, workOn=false, curJob=null;
let cam={x:0,y:0}, K={}, PK={};

let P={x:0,y:0,w:16,h:20,spd:2.8,dx:0,dy:0,dir:'down',an:0,
money:100,hp:100,sta:100,hun:100,
fit:'default',fitN:'Camiseta Branca',
car:null,inCar:false,cAng:0,cSpd:0,
ownFit:['default'],ownCar:[],
jobs:0,infS:false,infT:0,
want:0,wantT:0,
punch:false,pT:0,pCD:0,
wCar:null};

let CK={h:6,m:0,day:1,a:0};
let mp=[], bld=[], plc=[], tre=[], npc=[], traf=[], cop=[], sCar=[], part=[], lamp=[];

const FITS={
default:{n:'Camiseta Branca',s:'#ecf0f1',p:'#2c3e50',pr:0},
suit:{n:'Terno',s:'#1a1a2e',p:'#0f0f1a',pr:500},
gang:{n:'Gangue',s:'#c0392b',p:'#1a1a1a',pr:300},
deliv:{n:'Entregador',s:'#e67e22',p:'#2c3e50',pr:150},
sport:{n:'Esportiva',s:'#2ecc71',p:'#1e8449',pr:200},
lux:{n:'Luxo',s:'#8e44ad',p:'#6c3483',pr:1000},
cas:{n:'Casual',s:'#2471a3',p:'#1a5276',pr:250},
neon:{n:'Neon',s:'#00e676',p:'#2979ff',pr:800},
hood:{n:'Moletom',s:'#37474f',p:'#263238',pr:180}};

const CARS={
scoot:{n:'Scooter',sp:4,tu:0.08,c:'#2ecc71',pr:500,w:14,h:22},
sedan:{n:'Sedan',sp:5.5,tu:0.05,c:'#5dade2',pr:1500,w:20,h:32},
sport:{n:'Esportivo',sp:8,tu:0.06,c:'#e74c3c',pr:5000,w:20,h:34,gl:1},
musc:{n:'Muscle',sp:7,tu:0.04,c:'#f39c12',pr:3500,w:22,h:36},
truck:{n:'Caminhonete',sp:4.5,tu:0.035,c:'#7f8c8d',pr:2000,w:24,h:38},
sup:{n:'Supercarro',sp:10,tu:0.07,c:'#9b59b6',pr:15000,w:22,h:36,gl:1}};

const FOOD=[
{n:'Pixel Burger',pr:15,hp:30,st:20},
{n:'Mega Meal',pr:35,hp:60,st:40},
{n:'Coffee ☕∞',pr:10,hp:0,st:100,inf:1},
{n:'Pizza Slice',pr:12,hp:20,st:15},
{n:'Energy 8-Bit',pr:8,hp:5,st:50},
{n:'Full Recovery',pr:75,hp:100,st:100}];

const HR=[20,35,50,65,80], VR=[15,35,55,75];

function genWorld(){
mp=[];bld=[];plc=[];tre=[];npc=[];traf=[];cop=[];sCar=[];part=[];lamp=[];
for(let y=0;y<MH;y++){mp[y]=[];for(let x=0;x<MW;x++)mp[y][x]=0;}
HR.forEach(r=>{for(let x=0;x<MW;x++){for(let w=-1;w<=1;w++)if(r+w>=0&&r+w<MH)mp[r+w][x]=1;if(r-2>=0)mp[r-2][x]=2;if(r+2<MH)mp[r+2][x]=2;}for(let x=4;x<MW;x+=8)lamp.push({x:x*T+16,y:(r-2)*T+8});});
VR.forEach(r=>{for(let y=0;y<MH;y++){for(let w=-1;w<=1;w++)if(r+w>=0&&r+w<MW)mp[y][r+w]=1;if(r-2>=0)mp[y][r-2]=2;if(r+2<MW)mp[y][r+2]=2;}for(let y=4;y<MH;y+=8)lamp.push({x:(r+2)*T+8,y:y*T+16});});
for(let y=5;y<14;y++)for(let x=3;x<12;x++)mp[y][x]=4;
for(let x=2;x<13;x++){mp[4][x]=5;mp[14][x]=5;}
for(let y=5;y<14;y++){mp[y][2]=5;mp[y][12]=5;}
for(let y=38;y<48;y++)for(let x=58;x<72;x++)if(mp[y][x]===0)mp[y][x]=6;

let zn=[{x1:17,y1:22,x2:33,y2:33},{x1:37,y1:22,x2:53,y2:33},{x1:17,y1:37,x2:33,y2:48},{x1:57,y1:22,x2:73,y2:33},{x1:77,y1:37,x2:93,y2:48},{x1:37,y1:52,x2:53,y2:63},{x1:57,y1:52,x2:73,y2:63},{x1:17,y1:67,x2:33,y2:78},{x1:37,y1:67,x2:53,y2:78},{x1:57,y1:37,x2:73,y2:48},{x1:77,y1:52,x2:93,y2:63},{x1:77,y1:22,x2:93,y2:33}];
let bc=['#2c3e50','#1e3a52','#243447','#5b2c6f','#4a235a','#616a6b'];
zn.forEach(z=>{let cx=z.x1;while(cx<z.x2){let cy=z.y1;while(cy<z.y2){if(Math.random()<0.5){let bw=(2+~~(Math.random()*3))*T,bh=(2+~~(Math.random()*3))*T,tw=Math.ceil(bw/T),th=Math.ceil(bh/T),ok=true;
for(let ty=cy;ty<cy+th;ty++)for(let tx=cx;tx<cx+tw;tx++)if(tx>=MW||ty>=MH||mp[ty][tx]!==0)ok=false;
if(ok&&cx+tw<z.x2&&cy+th<z.y2){bld.push({x:cx*T,y:cy*T,w:bw,h:bh,c:bc[~~(Math.random()*bc.length)],wi:Math.random()>0.2});
for(let ty=cy;ty<cy+th;ty++)for(let tx=cx;tx<cx+tw;tx++)mp[ty][tx]=3;}}cy+=3+~~(Math.random()*2);}cx+=3+~~(Math.random()*2);}});

plc=[
{x:8*T,y:22*T,w:3*T,h:3*T,nm:'🏠 Sua Casa',tp:'home',cl:'#2ecc71'},
{x:19*T,y:22*T,w:4*T,h:3*T,nm:'🍔 Byte & Eat',tp:'food',cl:'#e74c3c'},
{x:24*T,y:22*T,w:4*T,h:3*T,nm:'👕 Thread Count',tp:'cloth',cl:'#9b59b6'},
{x:29*T,y:22*T,w:5*T,h:3*T,nm:'🏎️ Neon Motors',tp:'cars',cl:'#3498db'},
{x:59*T,y:52*T,w:4*T,h:3*T,nm:'🍕 Pixel Pizza',tp:'food',cl:'#e67e22'},
{x:39*T,y:67*T,w:4*T,h:3*T,nm:'👗 Drip District',tp:'cloth',cl:'#e91e63'},
{x:79*T,y:22*T,w:4*T,h:3*T,nm:'🏥 Hospital',tp:'hosp',cl:'#ecf0f1'},
{x:19*T,y:37*T,w:2*T,h:2*T,nm:'🍕 Pizza Job',tp:'job',jb:'pizza',cl:'#e67e22'},
{x:59*T,y:37*T,w:2*T,h:2*T,nm:'🚕 Táxi',tp:'job',jb:'taxi',cl:'#f1c40f'},
{x:39*T,y:52*T,w:2*T,h:2*T,nm:'💪 Segurança',tp:'job',jb:'bounce',cl:'#e74c3c'},
{x:79*T,y:37*T,w:2*T,h:2*T,nm:'🗑️ Lixo',tp:'job',jb:'garb',cl:'#27ae60'},
{x:59*T,y:22*T,w:2*T,h:2*T,nm:'📦 Correios',tp:'job',jb:'cour',cl:'#3498db'},
{x:79*T,y:52*T,w:2*T,h:2*T,nm:'🏗️ Construção',tp:'job',jb:'const',cl:'#f39c12'},
{x:19*T,y:67*T,w:2*T,h:2*T,nm:'🔧 Mecânico',tp:'job',jb:'mech',cl:'#7f8c8d'},
{x:59*T,y:67*T,w:2*T,h:2*T,nm:'💻 Hacker',tp:'job',jb:'hack',cl:'#2ecc71'}];

plc.forEach(p=>{let tx1=~~(p.x/T),ty1=~~(p.y/T),tw=Math.ceil(p.w/T),th=Math.ceil(p.h/T);
for(let ty=ty1-2;ty<=ty1+th+2;ty++)for(let tx=tx1-2;tx<=tx1+tw+2;tx++)
if(tx>=0&&tx<MW&&ty>=0&&ty<MH&&(mp[ty][tx]===3||mp[ty][tx]===0))mp[ty][tx]=2;});

for(let i=0;i<350;i++){let tx=~~(Math.random()*MW),ty=~~(Math.random()*MH);
if(mp[ty][tx]===0||mp[ty][tx]===6){let near=false;
bld.forEach(b=>{if(tx*T>b.x-T*2&&tx*T<b.x+b.w+T*2&&ty*T>b.y-T*2&&ty*T<b.y+b.h+T*2)near=true;});
plc.forEach(p=>{if(Math.hypot(tx*T-p.x,ty*T-p.y)<140)near=true;});
if(!near)tre.push({x:tx*T+16,y:ty*T+16});}}

let sh=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#e91e63','#1abc9c','#ecf0f1'];
let sk=['#f4c07e','#d4a574','#c68e5b','#8d5524','#f5d0a9'];
for(let i=0;i<80;i++){let nx,ny,t=0;do{nx=~~(Math.random()*MW);ny=~~(Math.random()*MH);t++;}while(t<200&&mp[ny][nx]!==2&&mp[ny][nx]!==1);
npc.push({x:nx*T+16,y:ny*T+16,dir:['up','down','left','right'][~~(Math.random()*4)],sp:0.4+Math.random()*0.6,mt:0,md:80+~~(Math.random()*100),pt:0,sh:sh[~~(Math.random()*sh.length)],sk:sk[~~(Math.random()*sk.length)],an:0,alive:true,hp:3,kb:0,kx:0,ky:0,ang:false,at:0});}

HR.forEach(r=>{for(let i=0;i<4;i++){let d=Math.random()>0.5?1:-1;traf.push({x:Math.random()*MW*T,y:r*T+(d>0?-4:12),w:28,h:16,sp:1.5+Math.random()*2.5,d,ax:'h',c:['#e74c3c','#3498db','#f39c12','#2ecc71','#9b59b6','#ecf0f1'][~~(Math.random()*6)]});}});
VR.forEach(r=>{for(let i=0;i<3;i++){let d=Math.random()>0.5?1:-1;traf.push({x:r*T+(d>0?-4:12),y:Math.random()*MH*T,w:16,h:28,sp:1.5+Math.random()*2,d,ax:'v',c:['#e74c3c','#3498db','#f39c12','#2ecc71'][~~(Math.random()*4)]});}});

for(let i=0;i<20;i++){let cx,cy,t=0;do{cx=~~(Math.random()*MW);cy=~~(Math.random()*MH);t++;}while(t<100&&mp[cy][cx]!==2&&mp[cy][cx]!==1);
let tp=Object.keys(CARS),ct=tp[~~(Math.random()*tp.length)];sCar.push({x:cx*T+16,y:cy*T+16,tp:ct,ag:Math.random()*6.28,tk:false});}
}

function isBlk(x,y,w,h){let pts=[{cx:x+2,cy:y+2},{cx:x+w-2,cy:y+2},{cx:x+2,cy:y+h-2},{cx:x+w-2,cy:y+h-2}];
for(let c of pts){let tx=~~(c.cx/T),ty=~~(c.cy/T);if(tx<0||tx>=MW||ty<0||ty>=MH)return true;if(mp[ty][tx]===3||mp[ty][tx]===4)return true;}
for(let t of tre)if(x<t.x+4&&x+w>t.x-4&&y<t.y+8&&y+h>t.y)return true;return false;}

function isN(){return CK.h>=20||CK.h<6;}
function lc(h,a){if(!h||h[0]!=='#')return'#888';let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return'#'+[Math.max(0,Math.min(255,r+a)),Math.max(0,Math.min(255,g+a)),Math.max(0,Math.min(255,b+a))].map(c=>c.toString(16).padStart(2,'0')).join('');}
function addPt(x,y,c,s){if(part.length>80)return;part.push({x,y,c,s,vx:(Math.random()-0.5)*2,vy:-1,l:1});}

let nearP=null;
function findNear(){let px=P.x+P.w/2,py=P.y+P.h/2,best=null,bd=999;
for(let p of plc){let cx=Math.max(p.x,Math.min(px,p.x+p.w)),cy=Math.max(p.y,Math.min(py,p.y+p.h)),d=Math.hypot(px-cx,py-cy);
if(d<70&&d<bd){bd=d;best=p;}}return best;}

function doInteract(){if(menuOn||workOn||!nearP)return;
let p=nearP;
if(p.tp==='home')openHome();
else if(p.tp==='food')openFood(p.nm);
else if(p.tp==='cloth')openCloth(p.nm);
else if(p.tp==='cars')openCars(p.nm);
else if(p.tp==='hosp'){if(P.money>=30){P.money-=30;P.hp=100;notify('🏥 -$30','#2ecc71');}else notify('💰$30','#e74c3c');refreshUI();}
else if(p.tp==='job')startJob(p.jb);}

function openM(title,items){menuOn=true;let m=document.getElementById('menu'),mt=document.getElementById('menuTitle'),mi=document.getElementById('menuItems');
m.style.display='block';mt.textContent=title;mi.innerHTML='';
items.forEach(i=>{let d=document.createElement('div');d.className='mi';
d.innerHTML=`<div><div class="mn">${i.n}</div>${i.d?'<div class="md">'+i.d+'</div>':''}</div><div class="mp">${i.p||''}</div>`;
d.onclick=i.a;mi.appendChild(d);});}

function closeMenu(){menuOn=false;document.getElementById('menu').style.display='none';}

function openHome(){openM('🏠 Casa',[
{n:'🛏️ Dormir',d:'Recupera tudo',a:()=>{P.hp=100;P.sta=100;P.hun=Math.min(100,P.hun+20);CK.h=6;CK.m=0;CK.day++;if(P.want>0){P.want=Math.max(0,P.want-2);P.wantT=P.want>0?20:0;}notify('😴 Dia '+CK.day,'#3498db');refreshUI();closeMenu();}},
{n:'💾 Salvar',a:()=>{save();notify('💾!','#2ecc71');closeMenu();}},
{n:'👔 Roupas('+P.ownFit.length+')',a:()=>{closeMenu();setTimeout(()=>openCloth('Roupas'),50);}},
...(P.ownCar.length>0?[{n:'🅿️ Garagem',d:P.ownCar.map(c=>CARS[c].n).join(','),a:()=>{P.inCar=true;P.car=P.ownCar[P.ownCar.length-1];P.cAng=0;P.cSpd=0;notify('🏎️'+CARS[P.car].n,'#3498db');closeMenu();}}]:[]),
{n:'📊 Status',d:`D${CK.day} $${P.money} J${P.jobs} ⭐${P.want}`}]);}

function openFood(nm){openM(nm,FOOD.map(f=>({n:f.n,d:`❤️+${f.hp} ⚡+${f.st}`,p:'$'+f.pr,
a:()=>{if(P.money>=f.pr){P.money-=f.pr;P.hp=Math.min(100,P.hp+f.hp);P.sta=Math.min(100,P.sta+f.st);P.hun=Math.min(100,P.hun+30);
if(f.inf){P.infS=true;P.infT=120000;P.sta=100;notify('☕∞!','#f39c12');}else notify('🍔'+f.n,'#2ecc71');refreshUI();closeMenu();}else notify('💰!','#e74c3c');}})));}

function openCloth(nm){let it=[];Object.entries(FITS).forEach(([k,o])=>{if(k==='default')return;let ow=P.ownFit.includes(k);
it.push({n:o.n+(ow?' ✓':''),p:ow?'VESTIR':'$'+o.pr,a:()=>{
if(ow){P.fit=k;P.fitN=o.n;notify('👕'+o.n,'#9b59b6');refreshUI();closeMenu();}
else if(P.money>=o.pr){P.money-=o.pr;P.ownFit.push(k);P.fit=k;P.fitN=o.n;notify('👕!','#2ecc71');refreshUI();closeMenu();}
else notify('💰!','#e74c3c');}});});openM('👕'+nm,it);}

function openCars(nm){let it=[];Object.entries(CARS).forEach(([k,c])=>{let ow=P.ownCar.includes(k);
it.push({n:c.n+(ow?' ✓':''),d:'Vel:'+c.sp+(c.gl?' ✨':''),p:ow?'✓':'$'+c.pr,a:()=>{
if(ow)return;if(P.money>=c.pr){P.money-=c.pr;P.ownCar.push(k);notify('🏎️'+c.n+'!','#2ecc71');refreshUI();closeMenu();}
else notify('💰!','#e74c3c');}});});openM('🏎️'+nm,it);}

cop.forEach((c,i)=>{c.an++;c.si++;let dx=P.x-c.x,dy=P.y-c.y,d=Math.hypot(dx,dy);if(d>0){let sp=c.cm?c.sp*1.5:c.sp;c.x+=dx/d*sp;c.y+=dy/d*sp;c.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up');if(c.cm)c.ca=Math.atan2(dx,-dy);}if(d<25){P.hp-=0.5;if(d<15){let f=Math.min(P.money,100*P.want);P.money-=f;P.want=0;P.wantT=0;P.hp=Math.max(20,P.hp-20);let h=plc[0];P.x=h.x+T;P.y=h.y+h.h+T;P.inCar=false;P.car=null;P.cSpd=0;P.wCar=null;cop=[];notify('🚔-$'+f,'#e74c3c');refreshUI();}}if(d>1500)cop.splice(i,1);});}
function updatePart(){for(let i=part.length-1;i>=0;i--){let p=part[i];p.x+=p.vx;p.y+=p.vy;p.l-=0.03;if(p.l<=0)part.splice(i,1);}}
function updateTime(dt){CK.a+=dt;if(CK.a>=2500){CK.a=0;CK.m++;if(CK.m>=60){CK.m=0;CK.h++;if(CK.h>=24){CK.h=0;CK.day++;P.hun=Math.max(0,P.hun-10);}}if(P.hun<=0)P.hp=Math.max(0,P.hp-0.5);if(P.sta<100&&!P.infS)P.sta=Math.min(100,P.sta+0.12);}}
function refreshUI(){document.getElementById('hpBar').style.width=P.hp+'%';document.getElementById('stBar').style.width=P.sta+'%';document.getElementById('huBar').style.width=P.hun+'%';document.getElementById('money').textContent='$'+P.money;document.getElementById('outfitD').textContent='👕'+P.fitN;

let w=document.getElementById('wanted');if(P.want>0){w.style.display='block';w.textContent='⭐'.repeat(P.want);}else w.style.display='none';
let dn=document.getElementById('dno');if(CK.h>=20||CK.h<6)dn.style.background='rgba(0,0,40,0.45)';else if(CK.h>=17)dn.style.background=`rgba(10,0,40,${0.15*((CK.h-17)/3)})`;else dn.style.background='none';}

function save(){localStorage.setItem('pc51',JSON.stringify({p:{x:P.x,y:P.y,money:P.money,hp:P.hp,sta:P.sta,hun:P.hun,fit:P.fit,fitN:P.fitN,ownFit:P.ownFit,ownCar:P.ownCar,jobs:P.jobs,want:P.want},gt:{...CK}}));}

tre.forEach(t=>ents.push({y:t.y+10,f:()=>{let tx=t.x-cam.x,ty=t.y-cam.y;if(tx<-25||tx>985||ty<-25||ty>665)return;X.fillStyle='rgba(0,0,0,0.15)';X.beginPath();X.ellipse(tx+2,ty+10,8,3,0.3,0,6.28);X.fill();X.fillStyle='#5d3a1a';X.fillRect(tx-2,ty,4,12);X.fillStyle='#1a6b30';X.beginPath();X.arc(tx,ty-2,9,0,6.28);X.fill();X.fillStyle='#228b3a';X.beginPath();X.arc(tx-3,ty-4,6,0,6.28);X.fill();}}));

cop.forEach(c=>ents.push({y:c.y,f:()=>{let cx=c.x-cam.x,cy=c.y-cam.y;if(cx<-40||cx>1000||cy<-40||cy>680)return;if(c.cm){X.save();X.translate(cx,cy);X.rotate(c.ca);X.fillStyle='#1a1a2e';X.fillRect(-10,-15,20,30);X.fillStyle=c.si%20<10?'#e74c3c':'#3498db';X.fillRect(-4,-17,8,3);if(isN()){X.shadowColor=c.si%20<10?'#e74c3c':'#3498db';X.shadowBlur=12;X.fillRect(-4,-17,8,3);X.shadowBlur=0;}X.restore();}else{dc(cx-9,cy-10,c.dir,true,c.an,'#1a237e','#d4a574',0.8);X.fillStyle='#f1c40f';X.fillRect(cx-2,cy-3,4,4);}}}));

ents.push({y:P.y+P.h,f:()=>{

ents.sort((a,b)=>a.y-b.y);ents.forEach(e=>e.f());
